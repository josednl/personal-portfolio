<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts: Archivo and Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Primary Meta Tags -->
    <title>José - Portfolio</title>
    <meta name="title" content="José - Portfolio" />
    <meta
      name="description"
      content="Portafolio personal de José - Desarrollador Full Stack especializado en React, TypeScript y desarrollo web moderno"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jose-portfolio.example.com/" />
    <meta property="og:title" content="José - Portfolio" />
    <meta
      property="og:description"
      content="Portafolio personal de José - Desarrollador Full Stack especializado en React, TypeScript y desarrollo web moderno"
    />
    <meta property="og:image" content="/icon.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://jose-portfolio.example.com/"
    />
    <meta property="twitter:title" content="José - Portfolio" />
    <meta
      property="twitter:description"
      content="Portafolio personal de José - Desarrollador Full Stack especializado en React, TypeScript y desarrollo web moderno"
    />
    <meta property="twitter:image" content="/icon.svg" />

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
